<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Carta Ninja Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #2c3e50;
            background-image: radial-gradient(#34495e 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Estilos específicos da carta */
        .ninja-card {
            background-color: #e5deb5;
            border: 12px solid #5a9b75;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .card-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed rgba(0,0,0,0.3);
            outline: none;
            width: 100%;
            font-family: inherit;
            color: #333;
        }
        
        .card-input:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 1024px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8 flex flex-col items-center justify-start relative">

    <!-- Toggle de Idioma -->
    <div class="w-full max-w-7xl flex justify-end mb-4 hide-on-print">
        <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-md">
            <span class="text-xs font-bold text-gray-500 transition-colors" id="lang-lbl-en">EN</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="lang-toggle" class="sr-only peer">
                <div class="w-11 h-6 bg-blue-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
            </label>
            <span class="text-xs font-bold text-gray-500 transition-colors" id="lang-lbl-pt">PT-BR</span>
        </div>
    </div>

    <div class="app-container flex gap-8 w-full max-w-7xl mx-auto">
        
        <!-- PAINEL DE CONTROLE -->
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full lg:w-1/3 flex-shrink-0 hide-on-print">
            <div class="mb-6 border-b pb-4">
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span data-i18n="panel_title">Painel de Criação</span>
                </h1>
                <p class="text-sm text-gray-500 mt-1" data-i18n="panel_desc">Personalize o visual e os status do seu Ninja aqui.</p>
            </div>

            <!-- Design e Vilas -->
            <div class="mb-6">
                <h2 class="font-semibold text-lg mb-3 border-b-2 border-yellow-500 inline-block" data-i18n="design">Design</h2>
                <div class="flex flex-col gap-4 text-sm">
                    <div class="flex items-center gap-3">
                        <label class="block text-gray-600 font-bold w-28" data-i18n="border_color">Cor da Borda:</label>
                        <input type="color" id="card-border-color" value="#5a9b75" class="w-10 h-10 cursor-pointer rounded border-0 p-0 shadow-sm">
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="block text-gray-600 font-bold w-28" data-i18n="village">Origem / Vila:</label>
                        <select id="village-select" class="border rounded px-2 py-2 flex-grow bg-gray-50 outline-none focus:border-blue-500 font-medium text-gray-800">
                            <option value="leaf">Vila da Folha</option>
                            <option value="leaf-r">Folha (Renegado)</option>
                            <option value="sand">Vila da Areia</option>
                            <option value="sand-r">Areia (Renegado)</option>
                            <option value="mist">Vila da Névoa</option>
                            <option value="mist-r">Névoa (Renegado)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Controles do Gráfico Radar (Status) -->
            <div class="mb-6">
                <h2 class="font-semibold text-lg mb-3 border-b-2 border-green-500 inline-block" data-i18n="combat_status">Rank de Atributos</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm">
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <input type="text" id="label-nin-panel" value="Drip" class="bg-transparent text-gray-600 font-bold w-2/3 outline-none border-b border-dashed border-gray-300 focus:border-green-500">
                            <span id="rank-val-nin" class="font-bold text-blue-600 text-xs">B</span>
                        </div>
                        <input type="range" id="stat-nin" min="0" max="10" step="1" value="5" class="w-full accent-green-600">
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <input type="text" id="label-tai-panel" value="Movimentação" class="bg-transparent text-gray-600 font-bold w-2/3 outline-none border-b border-dashed border-gray-300 focus:border-green-500">
                            <span id="rank-val-tai" class="font-bold text-blue-600 text-xs">B</span>
                        </div>
                        <input type="range" id="stat-tai" min="0" max="10" step="1" value="5" class="w-full accent-green-600">
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <input type="text" id="label-gen-panel" value="Habilidade" class="bg-transparent text-gray-600 font-bold w-2/3 outline-none border-b border-dashed border-gray-300 focus:border-green-500">
                            <span id="rank-val-gen" class="font-bold text-blue-600 text-xs">B</span>
                        </div>
                        <input type="range" id="stat-gen" min="0" max="10" step="1" value="5" class="w-full accent-green-600">
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <input type="text" id="label-int-panel" value="Noção" class="bg-transparent text-gray-600 font-bold w-2/3 outline-none border-b border-dashed border-gray-300 focus:border-green-500">
                            <span id="rank-val-int" class="font-bold text-blue-600 text-xs">B</span>
                        </div>
                        <input type="range" id="stat-int" min="0" max="10" step="1" value="5" class="w-full accent-green-600">
                    </div>
                    <div class="col-span-2">
                        <div class="flex justify-between items-end mb-1">
                            <input type="text" id="label-str-panel" value="PvP" class="bg-transparent text-gray-600 font-bold w-2/3 outline-none border-b border-dashed border-gray-300 focus:border-green-500">
                            <span id="rank-val-str" class="font-bold text-blue-600 text-xs">B</span>
                        </div>
                        <input type="range" id="stat-str" min="0" max="10" step="1" value="5" class="w-full accent-green-600">
                    </div>
                </div>
            </div>

            <!-- Botão de Copiar -->
            <button id="copy-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition flex items-center justify-center gap-2 mt-4">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <span data-i18n="copy_btn">Copiar Cartão</span>
            </button>
            <p class="text-xs text-center text-gray-400 mt-2" data-i18n="hint">Dica: Os textos também podem ser editados clicando neles na própria carta!</p>
        </div>

        <!-- CARTA NINJA (Preview) -->
        <div class="flex-grow flex justify-center">
            <!-- Container com proporções fixas -->
            <div id="carta-container" class="ninja-card w-[480px] h-[680px] rounded flex flex-col p-4">
                
                <!-- Cabeçalho -->
                <div class="flex justify-between items-center mb-6">
                    <!-- Símbolo Genérico da Vila (Decorativo esquerdo) -->
                    <div class="w-12 h-12 flex items-center justify-center">
                        <svg viewBox="0 0 100 100" class="w-10 h-10 text-gray-800" fill="currentColor">
                            <path d="M50,10 C27.9,10 10,27.9 10,50 C10,72.1 27.9,90 50,90 C72.1,90 90,72.1 90,50 C90,41.5 87.3,33.6 82.8,27.1 L75.7,34.2 C78.4,38.7 80,44.1 80,50 C80,66.5 66.5,80 50,80 C33.5,80 20,66.5 20,50 C20,33.5 33.5,20 50,20 C54.3,20 58.4,20.9 62.1,22.5 L69.5,15.1 C63.7,11.8 57,10 50,10 Z" />
                            <path d="M60,35 C65,40 65,48 60,53 L45,68 C42,71 37,71 34,68 C31,65 31,60 34,57 L49,42 C51,40 54,40 56,42 C58,44 58,47 56,49 L46,59 C45,60 44,60 43,59 C42,58 42,57 43,56 L51,48 L48,45 L40,53 C38,55 38,58 40,60 C42,62 45,62 47,60 L62,45 C67,40 67,32 62,27 L50,15 L60,35 Z" />
                            <polygon points="10,40 25,50 15,60" />
                        </svg>
                    </div>
                    
                    <!-- Símbolo Dinâmico (Fogo, Água, etc) e Texto -->
                    <div class="flex items-center gap-2 relative">
                        <div id="village-symbol-container" class="bg-red-600 rounded-full w-10 h-10 flex items-center justify-center border-2 border-red-800 shadow-sm relative overflow-hidden transition-colors flex-shrink-0">
                            <span id="symbol-text" class="text-white font-bold text-xl relative z-10">火</span>
                            <div id="renegade-slash" class="absolute w-full h-1 bg-gray-900 -rotate-45 hidden z-20 shadow-sm top-1/2 -translate-y-1/2"></div>
                        </div>
                        <input type="text" id="village-name-input" value="Vila da Folha" class="text-xl font-bold tracking-wider text-gray-800 bg-transparent outline-none w-48 hover:bg-white/50 focus:bg-white/80 rounded cursor-text px-1 text-left" title="Nome da Vila (Editável)">
                    </div>
                </div>

                <!-- Seção Superior: Dados e Foto -->
                <div class="flex gap-4 mb-6"> 
                    <!-- Dados -->
                    <div class="flex-1 flex flex-col justify-start gap-4 pt-1">
                        <div class="flex items-end">
                            <span class="font-bold text-sm whitespace-nowrap mr-2" data-i18n="rank_label">Tierlist Rank:</span>
                            <input type="text" value="S" class="card-input font-mono text-sm font-bold text-red-700 w-16">
                        </div>
                        <div class="flex items-end">
                            <span class="font-bold text-sm whitespace-nowrap mr-2" data-i18n="specialty_label">Especialidade:</span>
                            <input type="text" value="Nenhuma" class="card-input font-bold text-sm">
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-sm" data-i18n="obs_label">Observações:</span>
                            <textarea id="obs-textarea" class="card-input text-xs resize-none h-32 bg-white/40 p-2 rounded mt-1 leading-relaxed" spellcheck="false">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent commodo cursus magna, vel scelerisque nisl consectetur et. Nullam in dui mauris.</textarea>
                        </div>
                    </div>

                    <!-- Foto Principal -->
                    <div class="w-40 flex flex-col items-center justify-start">
                        <div class="w-32 h-40 bg-white border-2 border-gray-400 p-1 shadow-md rotate-2 mb-3 relative cursor-pointer group" onclick="document.getElementById('file-main').click()">
                            
                            <!-- Placeholder "Enviar Imagem" -->
                            <div id="image-placeholder" class="absolute inset-1 border-2 border-dashed border-gray-400 bg-white flex flex-col items-center justify-center text-gray-500 z-10">
                                <span class="text-3xl font-light mb-1">+</span>
                                <span data-i18n="upload_text" class="text-xs font-bold text-center leading-tight">Enviar<br>Imagem</span>
                            </div>

                            <!-- Imagem Real -->
                            <img id="img-main" src="" alt="Ninja" class="w-full h-full object-cover relative z-20 hidden" title="Clique para alterar a foto">
                            
                            <input type="file" id="file-main" class="hidden" accept="image/*">
                        </div>
                        <div class="w-full bg-[#9cb3d4] border-2 border-[#7a93b5] rounded-sm p-1 text-center shadow-sm">
                            <input type="text" value="Nome" class="bg-transparent text-center w-full font-bold text-gray-800 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Seção Inferior: Gráficos -->
                <div class="flex-grow flex justify-between items-center relative px-2 pb-6">
                    
                    <!-- Gráfico de Barras -->
                    <div class="w-32 h-44 bg-white/50 border border-gray-400 p-2 rounded-sm shadow-inner relative z-10 flex flex-col mb-4">
                        <div class="flex-grow relative w-full">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>

                    <!-- Gráfico Radar Principal -->
                    <div class="relative w-60 h-60 mr-4 mt-4">
                        <canvas id="radarChart"></canvas>
                        
                        <!-- Rótulos dinâmicos (Nomes) e Kanjis nas pontas EXATAS do Pentágono -->
                        <!-- Topo -->
                        <div class="absolute flex flex-col items-center w-32" style="top: -6%; left: 50%; margin-left: -4rem;">
                            <span class="text-[10px] font-bold text-gray-500 mb-0.5">忍</span>
                            <input type="text" id="label-nin-card" value="Drip" class="text-[11px] font-bold text-gray-800 bg-transparent text-center w-full outline-none hover:bg-white/50 focus:bg-white/80 rounded cursor-text leading-none">
                        </div>
                        
                        <!-- Direita Cima -->
                        <div class="absolute flex flex-col items-center w-32" style="top: 26%; right: -3.5rem;">
                            <span class="text-[10px] font-bold text-gray-500 mb-0.5">体</span>
                            <input type="text" id="label-tai-card" value="Movimentação" class="text-[11px] font-bold text-gray-800 bg-transparent text-center w-full outline-none hover:bg-white/50 focus:bg-white/80 rounded cursor-text leading-none">
                        </div>
                        
                        <!-- Direita Baixo -->
                        <div class="absolute flex flex-col items-center w-32" style="bottom: -1rem; right: -2.5rem;">
                            <span class="text-[10px] font-bold text-gray-500 mb-0.5">幻</span>
                            <input type="text" id="label-gen-card" value="Habilidade" class="text-[11px] font-bold text-gray-800 bg-transparent text-center w-full outline-none hover:bg-white/50 focus:bg-white/80 rounded cursor-text leading-none">
                        </div>
                        
                        <!-- Esquerda Baixo -->
                        <div class="absolute flex flex-col items-center w-32" style="bottom: -1rem; left: -2.5rem;">
                            <span class="text-[10px] font-bold text-gray-500 mb-0.5">知</span>
                            <input type="text" id="label-int-card" value="Noção" class="text-[11px] font-bold text-gray-800 bg-transparent text-center w-full outline-none hover:bg-white/50 focus:bg-white/80 rounded cursor-text leading-none">
                        </div>
                        
                        <!-- Esquerda Cima -->
                        <div class="absolute flex flex-col items-center w-32" style="top: 26%; left: -3.5rem;">
                            <span class="text-[10px] font-bold text-gray-500 mb-0.5">力</span>
                            <input type="text" id="label-str-card" value="PvP" class="text-[11px] font-bold text-gray-800 bg-transparent text-center w-full outline-none hover:bg-white/50 focus:bg-white/80 rounded cursor-text leading-none">
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- Toast Notification (Aviso de Cópia) -->
    <div id="toast-notification" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded shadow-xl opacity-0 pointer-events-none translate-y-4 transition-all duration-300 z-50 flex items-center gap-2">
        <svg id="toast-icon-success" class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <svg id="toast-icon-error" class="w-5 h-5 text-red-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        <span id="toast-message" class="font-semibold text-sm">Cartão copiado!</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Array de Ranks
            const rankLabels = ['?', 'D', 'D+', 'C', 'C+', 'B', 'B+', 'A', 'A+', 'S', 'S+'];

            // --- 0. DICIONÁRIO E INTERNACIONALIZAÇÃO (i18n) ---
            const dict = {
                en: {
                    panel_title: "Creation Panel",
                    panel_desc: "Customize your Ninja's visual and stats here.",
                    design: "Design",
                    border_color: "Border Color:",
                    village: "Origin / Village:",
                    combat_status: "Attributes Rank",
                    copy_btn: "Copy Card",
                    hint: "Hint: Texts can also be edited by clicking directly on the card!",
                    rank_label: "Tierlist Rank:",
                    specialty_label: "Specialty:",
                    obs_label: "Notes:",
                    obs_default: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent commodo cursus magna, vel scelerisque nisl consectetur et. Nullam in dui mauris.",
                    upload_text: "Upload<br>Image",
                    copied_success: "Card copied! Ready to paste (Ctrl+V).",
                    copied_fail: "Error copying. Browser may not support it.",
                    villages: {
                        'leaf': 'Hidden Leaf',
                        'leaf-r': 'Rogue Leaf',
                        'sand': 'Hidden Sand',
                        'sand-r': 'Rogue Sand',
                        'mist': 'Hidden Mist',
                        'mist-r': 'Rogue Mist'
                    },
                    stats: ['Drip', 'Movement', 'Skill', 'Awareness', 'PvP']
                },
                pt: {
                    panel_title: "Painel de Criação",
                    panel_desc: "Personalize o visual e os status do seu Ninja aqui.",
                    design: "Design",
                    border_color: "Cor da Borda:",
                    village: "Origem / Vila:",
                    combat_status: "Rank de Atributos",
                    copy_btn: "Copiar Cartão",
                    hint: "Dica: Os textos também podem ser editados clicando neles na própria carta!",
                    rank_label: "Tierlist Rank:",
                    specialty_label: "Especialidade:",
                    obs_label: "Observações:",
                    obs_default: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent commodo cursus magna, vel scelerisque nisl consectetur et. Nullam in dui mauris.",
                    upload_text: "Enviar<br>Imagem",
                    copied_success: "Cartão copiado! Pronto para colar (Ctrl+V).",
                    copied_fail: "Erro ao copiar. O navegador pode não suportar.",
                    villages: {
                        'leaf': 'Vila da Folha',
                        'leaf-r': 'Folha (Renegado)',
                        'sand': 'Vila da Areia',
                        'sand-r': 'Areia (Renegado)',
                        'mist': 'Vila da Névoa',
                        'mist-r': 'Névoa (Renegado)'
                    },
                    stats: ['Drip', 'Movimentação', 'Habilidade', 'Noção', 'PvP']
                }
            };

            // Detectar Idioma
            const userLang = (navigator.language || navigator.userLanguage).toLowerCase();
            let isPt = userLang.startsWith('pt');
            
            const langToggle = document.getElementById('lang-toggle');
            langToggle.checked = isPt;

            const applyLanguage = (lang) => {
                const d = dict[lang];

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (d[key]) el.innerHTML = d[key];
                });

                const select = document.getElementById('village-select');
                Array.from(select.options).forEach(opt => {
                    opt.text = d.villages[opt.value];
                });

                document.getElementById('village-name-input').value = select.options[select.selectedIndex].text;
                
                // Só reseta a box de observação se ela ainda tiver o default de outra língua
                const obsBox = document.getElementById('obs-textarea');
                if (obsBox.value === dict.pt.obs_default || obsBox.value === dict.en.obs_default) {
                    obsBox.value = d.obs_default;
                }

                const statInputs = ['nin', 'tai', 'gen', 'int', 'str'];
                statInputs.forEach((stat, index) => {
                    document.getElementById(`label-${stat}-panel`).value = d.stats[index];
                    document.getElementById(`label-${stat}-card`).value = d.stats[index];
                    if (window.barChart) {
                        window.barChart.data.labels[index] = d.stats[index].substring(0, 3);
                    }
                });
                if (window.barChart) window.barChart.update();

                if(lang === 'pt') {
                    document.getElementById('lang-lbl-pt').classList.replace('text-gray-500', 'text-green-600');
                    document.getElementById('lang-lbl-en').classList.replace('text-blue-600', 'text-gray-500');
                } else {
                    document.getElementById('lang-lbl-en').classList.replace('text-gray-500', 'text-blue-600');
                    document.getElementById('lang-lbl-pt').classList.replace('text-green-600', 'text-gray-500');
                }
            };

            // --- 1. CONFIGURAÇÃO DE UPLOAD DE IMAGENS ---
            const setupImageUpload = (inputId, imgId, placeholderId) => {
                const input = document.getElementById(inputId);
                const img = document.getElementById(imgId);
                const placeholder = document.getElementById(placeholderId);
                
                input.addEventListener('change', function(e) {
                    if (e.target.files && e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            img.src = event.target.result;
                            img.classList.remove('hidden');
                            if (placeholder) placeholder.style.display = 'none';
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });
            };

            setupImageUpload('file-main', 'img-main', 'image-placeholder');

            // --- 2. CONFIGURAÇÃO DOS GRÁFICOS (Chart.js) ---
            Chart.defaults.font.family = "'Noto Sans JP', sans-serif";
            const initialData = [5, 5, 5, 5, 5]; // Default em 'B'
            
            // Gráfico Radar
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            const radarChart = new Chart(ctxRadar, {
                type: 'radar',
                data: {
                    labels: ['Drip', 'Movimentação', 'Habilidade', 'Noção', 'PvP'],
                    datasets: [{
                        label: 'Status',
                        data: [...initialData],
                        backgroundColor: 'rgba(220, 38, 38, 0.6)', 
                        borderColor: 'rgba(220, 38, 38, 1)',
                        borderWidth: 1.5,
                        pointBackgroundColor: 'rgba(220, 38, 38, 1)',
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: 10 },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: {
                        r: {
                            min: 0,
                            max: 10,
                            ticks: { display: false, stepSize: 2 },
                            grid: { color: 'rgba(88, 140, 115, 0.5)', lineWidth: 1.5 },
                            angleLines: { color: 'rgba(88, 140, 115, 0.5)', lineWidth: 1.5 },
                            pointLabels: { display: false }
                        }
                    }
                }
            });

            // Gráfico de Barras
            const ctxBar = document.getElementById('barChart').getContext('2d');
            window.barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['Dri', 'Mov', 'Hab', 'Noç', 'PvP'],
                    datasets: [{
                        data: [...initialData],
                        backgroundColor: [
                            'rgba(220, 38, 38, 0.8)',   
                            'rgba(34, 197, 94, 0.8)',   
                            'rgba(168, 85, 247, 0.8)',  
                            'rgba(59, 130, 246, 0.8)',  
                            'rgba(234, 179, 8, 0.8)'    
                        ],
                        borderWidth: 0,
                        borderRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: {
                        x: { display: false }, 
                        y: { min: 0, max: 10, display: false } 
                    },
                    layout: { padding: 0 }
                }
            });


            // --- 3. LIGAR O PAINEL DE CONTROLE AOS ELEMENTOS ---
            applyLanguage(isPt ? 'pt' : 'en');
            langToggle.addEventListener('change', (e) => applyLanguage(e.target.checked ? 'pt' : 'en'));

            const statInputsList = ['nin', 'tai', 'gen', 'int', 'str'];
            statInputsList.forEach((stat, index) => {
                const input = document.getElementById(`stat-${stat}`);
                const panelLabel = document.getElementById(`label-${stat}-panel`);
                const cardLabel = document.getElementById(`label-${stat}-card`);
                const rankDisplay = document.getElementById(`rank-val-${stat}`);
                
                input.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    rankDisplay.innerText = rankLabels[val]; // Atualiza a Letra do Rank na UI
                    radarChart.data.datasets[0].data[index] = val;
                    radarChart.update();
                    window.barChart.data.datasets[0].data[index] = val;
                    window.barChart.update();
                });
                
                const syncLabels = (val) => {
                    panelLabel.value = val;
                    cardLabel.value = val;
                    window.barChart.data.labels[index] = val.substring(0, 3);
                    window.barChart.update();
                };

                panelLabel.addEventListener('input', (e) => syncLabels(e.target.value));
                cardLabel.addEventListener('input', (e) => syncLabels(e.target.value));
            });

            document.getElementById('card-border-color').addEventListener('input', (e) => {
                document.getElementById('carta-container').style.borderColor = e.target.value;
            });

            const configs = {
                'leaf':   { s: '火', bg: '#dc2626', r: false },
                'leaf-r': { s: '火', bg: '#6b7280', r: true },
                'sand':   { s: '風', bg: '#ea580c', r: false },
                'sand-r': { s: '風', bg: '#6b7280', r: true },
                'mist':   { s: '水', bg: '#2563eb', r: false },
                'mist-r': { s: '水', bg: '#6b7280', r: true }
            };

            document.getElementById('village-select').addEventListener('change', (e) => {
                const val = e.target.value;
                const chosen = configs[val];
                
                document.getElementById('symbol-text').innerText = chosen.s;
                
                const container = document.getElementById('village-symbol-container');
                container.style.backgroundColor = chosen.bg;
                container.style.borderColor = chosen.bg;
                
                const slash = document.getElementById('renegade-slash');
                if (chosen.r) slash.classList.remove('hidden');
                else slash.classList.add('hidden');

                const optionText = e.target.options[e.target.selectedIndex].text;
                document.getElementById('village-name-input').value = optionText;
            });

            // Funções ajustadas para cópia e alinhamento impecáveis
            let printReplacements = [];

            function replaceInputsForPrint(container) {
                const inputs = container.querySelectorAll('input[type="text"], textarea');
                inputs.forEach(input => {
                    const isTextarea = input.tagName === 'TEXTAREA';
                    const replacer = document.createElement('div');
                    const computed = window.getComputedStyle(input);
                    
                    replacer.innerText = input.value;
                    replacer.className = input.className;
                    
                    // Copiar estilos chaves da fonte
                    replacer.style.font = computed.font;
                    replacer.style.color = computed.color;
                    replacer.style.textAlign = computed.textAlign;
                    replacer.style.letterSpacing = computed.letterSpacing;
                    replacer.style.backgroundColor = computed.backgroundColor;
                    
                    // Box-model exato
                    replacer.style.width = computed.width;
                    replacer.style.height = computed.height;
                    replacer.style.padding = computed.padding;
                    replacer.style.margin = computed.margin;
                    replacer.style.boxSizing = 'border-box';
                    
                    // Preservar a Borda Inferior tracejada dos inputs (Tierlist, Especialidade, Atributos)
                    replacer.style.border = 'none'; 
                    replacer.style.outline = 'none';
                    if (!isTextarea) {
                        replacer.style.borderBottom = computed.borderBottom; 
                    }

                    if (isTextarea) {
                        replacer.style.whiteSpace = 'pre-wrap';
                        replacer.style.wordBreak = 'break-word';
                        replacer.style.overflow = 'hidden';
                    } else {
                        replacer.style.whiteSpace = 'nowrap';
                        replacer.style.overflow = 'visible'; 
                        replacer.style.display = 'block'; // Usar bloco e line-height impede o desvio para baixo
                        replacer.style.lineHeight = computed.lineHeight !== 'normal' ? computed.lineHeight : computed.height;
                    }

                    input.parentNode.insertBefore(replacer, input);
                    input.style.display = 'none';
                    
                    printReplacements.push({ input, replacer });
                });
            }

            function restoreInputsAfterPrint() {
                printReplacements.forEach(({ input, replacer }) => {
                    input.style.display = ''; 
                    replacer.remove(); 
                });
                printReplacements = [];
            }

            function showToast(message, isError = false) {
                const toast = document.getElementById('toast-notification');
                const msgEl = document.getElementById('toast-message');
                const iconSuccess = document.getElementById('toast-icon-success');
                const iconError = document.getElementById('toast-icon-error');
                
                msgEl.innerText = message;
                
                if (isError) {
                    toast.classList.replace('bg-gray-800', 'bg-red-800');
                    iconSuccess.classList.add('hidden');
                    iconError.classList.remove('hidden');
                } else {
                    toast.classList.replace('bg-red-800', 'bg-gray-800');
                    iconError.classList.add('hidden');
                    iconSuccess.classList.remove('hidden');
                }

                toast.classList.remove('opacity-0', 'translate-y-4');
                
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-4');
                }, 4000); 
            }

            // --- 4. EXPORTAR COMO IMAGEM (COPIAR CARTÃO) ---
            document.getElementById('copy-btn').addEventListener('click', () => {
                const card = document.getElementById('carta-container');
                const btn = document.getElementById('copy-btn');
                const lang = document.getElementById('lang-toggle').checked ? 'pt' : 'en';
                
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Copiando...';
                btn.classList.add('opacity-50', 'cursor-not-allowed');

                replaceInputsForPrint(card);

                setTimeout(() => {
                    html2canvas(card, {
                        backgroundColor: '#e5deb5', 
                        scale: 3, 
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        canvas.toBlob(blob => {
                            if (!blob) {
                                showToast(dict[lang].copied_fail, true);
                                return;
                            }
                            try {
                                const item = new ClipboardItem({ 'image/png': blob });
                                navigator.clipboard.write([item]).then(() => {
                                    showToast(dict[lang].copied_success);
                                }).catch(err => {
                                    console.error('Erro de permissão:', err);
                                    showToast(dict[lang].copied_fail, true);
                                });
                            } catch (e) {
                                console.error('Clipboard API não suportada:', e);
                                showToast(dict[lang].copied_fail, true);
                            }
                        }, 'image/png');
                    }).catch(err => {
                        console.error('Erro ao gerar imagem:', err);
                        showToast(dict[lang].copied_fail, true);
                    }).finally(() => {
                        restoreInputsAfterPrint();
                        btn.innerHTML = originalText;
                        btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                }, 100);
            });

        });
    </script>
</body>
</html>
